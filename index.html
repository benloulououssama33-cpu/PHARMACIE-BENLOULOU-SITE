<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صيدلية بن لولو - المتجر الكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; scroll-behavior: smooth; background-color: #f0fdf4; } 
        .hero-bg { background: linear-gradient(135deg, #065f46 0%, #064e3b 100%); }
        .product-card { transition: all 0.3s ease; display: flex; flex-direction: column; height: 100%; background: white; border-radius: 20px; overflow: hidden; border: 1px solid #d1fae5; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 20px 25px -5px rgba(6, 78, 59, 0.1); }
        .img-container { width: 100%; height: 220px; display: flex; align-items: center; justify-content: center; padding: 15px; background: white; }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(6, 78, 59, 0.8); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal.active { display: flex; }
    </style>
</head>
<body class="text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50 border-b border-emerald-100">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://i.ibb.co/C3tQkBgs/SDS-PNG.png" alt="لوجو صيدلية بن لولو" class="h-14">
                <h1 class="text-2xl font-bold text-emerald-900">صيدلية بن لولو</h1>
            </div>
            <a href="tel:+213558061159" class="bg-emerald-600 text-white px-5 py-2 rounded-full font-bold text-sm shadow-md">📞 0558 06 11 59</a>
        </div>
    </header>

    <!-- Hero -->
    <section class="hero-bg text-white py-16 px-4 text-center">
        <h2 class="text-3xl md:text-5xl font-bold mb-4">صيدلية بن لولو - حي أينورار</h2>
        <p class="text-lg opacity-90">القائمة الكاملة لمنتجاتنا بين يديك الآن.</p>
    </section>

    <!-- المنتجات الكاملة -->
    <main class="max-w-7xl mx-auto px-4 py-12">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
            <script>
                const products = [
                    {name: 'CAN BEBE N1 P/9', img: 'https://shopicornermarket.com/wp-content/uploads/2025/05/1000010459.jpg'},
                    {name: 'CAN BEBE N2 P/9', img: 'https://shopicornermarket.com/wp-content/uploads/2025/05/1000010465.jpg'},
                    {name: 'CAN BEBE N3 P/9', img: 'https://shopicornermarket.com/wp-content/uploads/2025/05/1000010794.png'},
                    {name: 'حفاضات كبار UNIFORM', img: 'https://parapharmaciebelaouane.com/wp-content/uploads/2024/03/uniform-couche-ad.png'},
                    {name: 'Douce Plus Talc 100G', img: 'https://pharmacie-denni.dz/wp-content/uploads/2025/05/64.png'},
                    {name: 'جل موف Moov 100G', img: 'https://thiqapharmacy.com/wp-content/uploads/2024/03/MOOV-RAPID-RELIEF-OINTMENT-100-G.JPG-jpg.webp'},
                    {name: 'جل فولترين Voltaren', img: 'https://www.soin-et-nature.com/media/cache/shop_product_large_thumbnail/products/5/3/3/3/9/53339.jpg'},
                    {name: 'BIOMAX OMEGA 3.6.9', img: 'https://biomax.dz/api/file/3454'}
                ];

                products.forEach(p => {
                    document.write(`
                        <div class="product-card">
                            <div class="img-container"><img src="${p.img}" alt="${p.name}"></div>
                            <div class="p-5 flex flex-col flex-grow text-center">
                                <h4 class="font-bold text-lg mb-6 text-emerald-950">${p.name}</h4>
                                <button onclick="openOrderModal('${p.name}')" class="mt-auto bg-emerald-700 text-white py-3 rounded-xl font-bold hover:bg-emerald-800 transition">اطلب الآن</button>
                            </div>
                        </div>
                    `);
                });
            </script>
        </div>
    </main>

    <!-- الخريطة والمعلومات -->
    <footer class="bg-emerald-900 text-white py-12">
        <div class="max-w-7xl mx-auto px-4 grid md:grid-cols-2 gap-10 items-center">
            <div>
                <h3 class="text-2xl font-bold mb-4">موقعنا في حي أينورار</h3>
                <p class="mb-6 opacity-80">بلدية القرارة، ولاية غرداية. نحن في خدمتكم دائماً.</p>
                <a href="https://www.google.com/maps/place/Pharmacie+benLoulou/@32.7890979,4.4962443,16z" target="_blank" class="bg-white text-emerald-900 px-6 py-2 rounded-lg font-bold">فتح الخريطة</a>
            </div>
            <div class="h-64 rounded-2xl overflow-hidden border-2 border-emerald-700">
                <iframe src="https://maps.google.com/maps?q=Pharmacie%20benLoulou&t=k&z=17&hl=ar&output=embed" class="w-full h-full border-0" allowfullscreen loading="lazy"></iframe>
            </div>
        </div>
    </footer>

    <!-- نافذة الطلب -->
    <div id="orderModal" class="modal px-4">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl relative border-t-8 border-emerald-600">
            <button onclick="closeModal()" class="absolute top-4 left-4 text-gray-400 text-2xl">✕</button>
            <div id="step-quantity" class="text-center">
                <h3 class="text-2xl font-bold mb-8">كم تريد من المنتج؟</h3>
                <div class="flex items-center justify-center gap-6 mb-8">
                    <button onclick="changeQty(-1)" class="w-12 h-12 border-2 border-emerald-200 rounded-xl font-bold">-</button>
                    <span id="qtyDisplay" class="text-4xl font-bold text-emerald-900">1</span>
                    <button onclick="changeQty(1)" class="w-12 h-12 border-2 border-emerald-200 rounded-xl font-bold">+</button>
                </div>
                <button onclick="showInfoStep()" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold">تأكيد الكمية</button>
            </div>
            <div id="step-info" class="hidden">
                <form id="orderForm" class="space-y-4">
                    <input type="hidden" id="prodName">
                    <input type="hidden" id="finalQty" value="1">
                    <input type="text" id="custName" placeholder="الاسم الكامل" class="w-full p-4 bg-emerald-50 rounded-xl outline-none" required>
                    <input type="tel" id="custPhone" placeholder="رقم الهاتف" class="w-full p-4 bg-emerald-50 rounded-xl outline-none" required>
                    <input type="text" id="custState" placeholder="الولاية" class="w-full p-4 bg-emerald-50 rounded-xl outline-none" required>
                    <button type="submit" class="w-full bg-emerald-700 text-white py-4 rounded-xl font-bold">إرسال الطلب</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // تم تصحيح الرابط بحذف المسافة الزائدة
        const webUrl = "https://sammb2003.app.n8n.cloud/webhook-test/  c4291c8f-0e25-4763-ad50-6e991cfa8890";
        
        let currentQty = 1;

        function openOrderModal(pName) {
            document.getElementById('prodName').value = pName;
            currentQty = 1;
            updateQtyDisplay();
            showQtyStep();
            document.getElementById('orderModal').classList.add('active');
        }

        function changeQty(val) { 
            currentQty = Math.max(1, currentQty + val); 
            updateQtyDisplay(); 
        }

        function updateQtyDisplay() { 
            document.getElementById('qtyDisplay').innerText = currentQty; 
            document.getElementById('finalQty').value = currentQty; 
        }

        function showInfoStep() { 
            document.getElementById('step-quantity').classList.add('hidden'); 
            document.getElementById('step-info').classList.remove('hidden'); 
        }

        function showQtyStep() { 
            document.getElementById('step-quantity').classList.remove('hidden'); 
            document.getElementById('step-info').classList.add('hidden'); 
        }

        function closeModal() { 
            document.getElementById('orderModal').classList.remove('active'); 
        }

        document.getElementById('orderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const payload = {
                product: document.getElementById('prodName').value,
                quantity: document.getElementById('finalQty').value, // إضافة الكمية المطلوبة
                customer: document.getElementById('custName').value,
                phone: document.getElementById('custPhone').value,
                location: document.getElementById('custState').value,
                shop: "صيدلية بن لولو",
                timestamp: new Date().toLocaleString('ar-DZ')
            };

            try {
                const res = await fetch(webUrl, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });

                if (res.ok) { 
                    alert('تم الطلب بنجاح! شكراً لثقتكم.'); 
                    closeModal(); 
                    document.getElementById('orderForm').reset();
                } else {
                    alert('فشل في الوصول للسيرفر، يرجى المحاولة لاحقاً.');
                }
            } catch (err) { 
                alert('عذراً، فشل الإرسال. تأكد من تفعيل "Listen for test event" في n8n.'); 
            }
        });
    </script>
</body>
</html>
